version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: tms-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: tms-backend
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/task-management-system
      - JWT_SECRET=supersecretjwtkey_replace_in_production
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: tms-frontend
    ports:
      - '5173:5173'
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  mongo-data:
